<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoTreina</title>
    <!--
      CSP: the inline script below is allowlisted by sha256 hash in vercel.json
      (script-src). Any byte change to it (even whitespace) breaks it in prod —
      recompute with `npm run csp:hash` and update vercel.json accordingly.
    -->
    <script>
      // apply persisted theme before first paint to avoid flash
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
      // set <html lang> before first paint, same rule as client/src/i18n/index.ts
      (function () {
        var stored = localStorage.getItem('language');
        var lang =
          stored === 'pt' || stored === 'en'
            ? stored
            : (navigator.language || '').toLowerCase().indexOf('pt') === 0
              ? 'pt'
              : 'en';
        document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en-US';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
